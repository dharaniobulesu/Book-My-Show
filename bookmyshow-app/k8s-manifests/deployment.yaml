apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmyshow
  labels:
    app: bookmyshow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookmyshow
  template:
    metadata:
      labels:
        app: bookmyshow
    spec:
      containers:
      - name: bookmyshow-container
        image: dharaniobulesu/bookmyshow:latest  # Replace with your Docker image
        ports:
        - containerPort: 3000  # Replace with the port your app runs on
